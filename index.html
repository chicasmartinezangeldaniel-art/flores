<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árbol de Flores Amarillas 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c518;
    --amber: #e8a900;
    --warm-cream: #fef9ec;
    --petal-light: #ffe566;
    --petal-mid: #f5c518;
    --petal-dark: #c8860a;
    --brown: #6b3a1f;
    --text: #3d2b0f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #fff8dc 0%, #fef0a0 40%, #fce882 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Floating petals background */
  .petal-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .fp {
    position: absolute;
    border-radius: 50% 0 50% 0;
    opacity: 0.35;
    animation: floatPetal linear infinite;
  }
  @keyframes floatPetal {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    width: min(420px, 94vw);
    background: var(--warm-cream);
    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(180,120,0,0.25), 0 4px 16px rgba(0,0,0,0.08);
    padding: 32px 28px 28px;
    text-align: center;
    animation: cardIn 1.2s cubic-bezier(.22,1,.36,1) both;
    border: 2px solid #f5c51833;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.88) translateY(40px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Flower border top */
  .flower-border {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .flower-border .fl { font-size: 26px; animation: wobble 3s ease-in-out infinite; }
  .flower-border .fl:nth-child(2) { animation-delay: .3s; }
  .flower-border .fl:nth-child(3) { animation-delay: .6s; }
  .flower-border .fl:nth-child(4) { animation-delay: .9s; }
  .flower-border .fl:nth-child(5) { animation-delay: 1.2s; }
  .flower-border .fl:nth-child(6) { animation-delay: 1.5s; }
  @keyframes wobble {
    0%,100% { transform: rotate(-8deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.12); }
  }

  /* SVG Tree Heart */
  .tree-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    margin: 0 0 14px;
  }

  /* Message text */
  .msg {
    font-family: 'Playfair Display', serif;
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 22px;
    padding: 0 8px;
    animation: fadeUp 1.4s 0.4s both;
  }
  .msg em {
    font-style: italic;
    color: var(--amber);
    font-size: 16px;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .msg .title {
    font-family: 'Dancing Script', cursive;
    font-size: 20px;
    color: var(--petal-dark);
    display: block;
    margin-bottom: 8px;
  }

  /* Divider */
  .divider {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, #f5c518, transparent);
    margin: 18px 0;
  }

  /* Timer */
  .timer-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: #9a6a10;
    margin-bottom: 10px;
    animation: fadeUp 1.6s 0.6s both;
  }
  .timer {
    display: flex;
    justify-content: center;
    gap: 10px;
    animation: fadeUp 1.6s 0.7s both;
  }
  .timer-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .timer-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    background: linear-gradient(160deg, #fff7cc 0%, #ffe566 100%);
    border-radius: 10px;
    padding: 6px 10px;
    min-width: 60px;
    line-height: 1;
    box-shadow: 0 3px 10px rgba(180,120,0,0.15);
    border: 1.5px solid #f5c51855;
    transition: transform 0.15s;
  }
  .timer-num.flip { animation: flip 0.3s ease; }
  @keyframes flip {
    0%   { transform: scaleY(1); }
    50%  { transform: scaleY(0.7); }
    100% { transform: scaleY(1); }
  }
  .timer-sep {
    font-size: 28px;
    font-weight: 700;
    color: var(--amber);
    align-self: center;
    margin-top: -10px;
  }
  .timer-lbl {
    font-size: 10px;
    color: #b08020;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 400;
  }

  /* Bottom flower border */
  .flower-border-bot {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .flower-border-bot .fl { font-size: 22px; animation: wobble 3.5s ease-in-out infinite; }
  .flower-border-bot .fl:nth-child(1) { animation-delay: 0.2s; }
  .flower-border-bot .fl:nth-child(2) { animation-delay: 0.7s; }
  .flower-border-bot .fl:nth-child(3) { animation-delay: 1.1s; }
  .flower-border-bot .fl:nth-child(4) { animation-delay: 1.5s; }
  .flower-border-bot .fl:nth-child(5) { animation-delay: 1.9s; }

  /* Seed grow animation */
  .tree-svg {
    animation: growIn 1.8s cubic-bezier(.34,1.56,.64,1) 0.3s both;
    transform-origin: bottom center;
  }
  @keyframes growIn {
    from { transform: scale(0.1) translateY(60px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Petals falling from tree */
  .falling-petal {
    position: absolute;
    font-size: 14px;
    animation: fall linear infinite;
    pointer-events: none;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity:0.9; }
    100% { transform: translateY(80px) translateX(var(--dx, 0px)) rotate(180deg); opacity:0; }
  }
</style>
</head>
<body>

<!-- Floating petals background -->
<div class="petal-bg" id="petalBg"></div>

<div class="card">
  <!-- Top flower border -->
  <div class="flower-border">
    <span class="fl">🌻</span>
    <span class="fl">🌼</span>
    <span class="fl">💛</span>
    <span class="fl">🌼</span>
    <span class="fl">🌻</span>
    <span class="fl">🌼</span>
  </div>

  <!-- SVG Heart Flower Tree -->
  <div class="tree-wrap" id="treeWrap">
    <svg class="tree-svg" width="220" height="230" viewBox="0 0 220 230" xmlns="http://www.w3.org/2000/svg">
      <!-- Trunk -->
      <rect x="100" y="165" width="20" height="55" rx="8" fill="#6b3a1f"/>
      <rect x="104" y="168" width="5" height="48" rx="3" fill="#8b5030" opacity="0.5"/>
      <!-- Roots -->
      <path d="M100 218 Q80 225 65 222" stroke="#6b3a1f" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M120 220 Q140 226 155 223" stroke="#6b3a1f" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M110 222 Q108 232 105 238" stroke="#6b3a1f" stroke-width="4" fill="none" stroke-linecap="round"/>

      <!-- Heart shape filled with flower dots -->
      <!-- Heart path: center ~110,145 -->
      <!-- We'll draw a heart as clipping region and fill with circles -->
      <defs>
        <clipPath id="heartClip">
          <path d="M110,80 C110,80 85,55 65,65 C40,77 40,110 65,130 L110,170 L155,130 C180,110 180,77 155,65 C135,55 110,80 110,80 Z"/>
        </clipPath>
      </defs>

      <!-- Heart background fill -->
      <path d="M110,80 C110,80 85,55 65,65 C40,77 40,110 65,130 L110,170 L155,130 C180,110 180,77 155,65 C135,55 110,80 110,80 Z"
            fill="#fff8d0" stroke="#f5c518" stroke-width="2"/>

      <!-- Flower dots inside heart -->
      <g clip-path="url(#heartClip)" id="flowerDots"></g>
    </svg>
  </div>

  <!-- Message -->
  <div class="msg">
    <span class="title">Flores Amarillas para tí niña linda:</span>
    <em>Si pudiera elegir un lugar seguro, sería a tu lado.</em><br><br>
  </div>

  <hr class="divider">

  <!-- Timer -->
  <div class="timer-label">Por tí esto espero esto y más</div>
  <div class="timer">
    <div class="timer-unit">
      <div class="timer-num" id="days">000</div>
      <div class="timer-lbl">días</div>
    </div>
    <div class="timer-sep">:</div>
    <div class="timer-unit">
      <div class="timer-num" id="hours">00</div>
      <div class="timer-lbl">horas</div>
    </div>
    <div class="timer-sep">:</div>
    <div class="timer-unit">
      <div class="timer-num" id="minutes">00</div>
      <div class="timer-lbl">min</div>
    </div>
    <div class="timer-sep">:</div>
    <div class="timer-unit">
      <div class="timer-num" id="seconds">00</div>
      <div class="timer-lbl">seg</div>
    </div>
  </div>

  <!-- Bottom flower border -->
  <div class="flower-border-bot">
    <span class="fl">🌼</span>
    <span class="fl">🌸</span>
    <span class="fl">🌻</span>
    <span class="fl">🌸</span>
    <span class="fl">🌼</span>
  </div>
</div>

<script>
// ─── Config: cambia esta fecha por la fecha de inicio de tu relación ───
const START_DATE = new Date('2024-03-21T00:00:00');
// ────────────────────────────────────────────────────────────────────────

// Generate flower dots inside heart SVG
function generateHeartFlowers() {
  const g = document.getElementById('flowerDots');
  const colors = ['#f5c518','#ffe566','#ffd700','#e8a900','#fff3a0','#f0b800'];
  const centerColors = ['#8b5e00','#5c3a00','#c87800','#4a3000'];

  // Heart boundary check (parametric heart formula)
  function inHeart(x, y) {
    // Normalize to -1..1 around center (110, 120)
    const nx = (x - 110) / 52;
    const ny = -(y - 125) / 52;
    // Heart formula: (x²+y²-1)³ - x²y³ ≤ 0
    const v = Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * Math.pow(ny, 3);
    return v <= 0.05;
  }

  let placed = 0;
  let attempts = 0;
  const flowers = [];

  while (placed < 55 && attempts < 2000) {
    attempts++;
    const x = 55 + Math.random() * 110;
    const y = 62 + Math.random() * 112;

    if (!inHeart(x, y)) continue;

    // Check spacing
    const r = 7 + Math.random() * 5;
    let ok = true;
    for (const f of flowers) {
      const dx = f.x - x, dy = f.y - y;
      if (Math.sqrt(dx*dx + dy*dy) < r + f.r + 2) { ok = false; break; }
    }
    if (!ok) continue;

    flowers.push({x, y, r});

    const color = colors[Math.floor(Math.random() * colors.length)];
    const center = centerColors[Math.floor(Math.random() * centerColors.length)];

    // Draw flower: 5-6 petals + center
    const petals = 5 + Math.floor(Math.random() * 2);
    let svg = `<g transform="translate(${x},${y}) rotate(${Math.random()*360})">`;
    for (let p = 0; p < petals; p++) {
      const angle = (360 / petals) * p;
      svg += `<ellipse cx="0" cy="-${r*0.65}" rx="${r*0.38}" ry="${r*0.55}"
        fill="${color}" opacity="0.92" transform="rotate(${angle})"/>`;
    }
    svg += `<circle cx="0" cy="0" r="${r*0.32}" fill="${center}"/>`;
    svg += '</g>';

    g.insertAdjacentHTML('beforeend', svg);
    placed++;
  }
}

// Generate background floating petals
function generateBgPetals() {
  const bg = document.getElementById('petalBg');
  const colors = ['#f5c518','#ffe566','#ffd700','#e8a900','#fff3a0'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'fp';
    const size = 12 + Math.random() * 22;
    el.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-duration:${6 + Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
      transform: rotate(${Math.random()*360}deg);
    `;
    bg.appendChild(el);
  }
}

// Timer
function updateTimer() {
  const now = new Date();
  let diff = Math.floor((now - START_DATE) / 1000);
  if (diff < 0) diff = 0;

  const days    = Math.floor(diff / 86400);
  const hours   = Math.floor((diff % 86400) / 3600);
  const minutes = Math.floor((diff % 3600) / 60);
  const secs    = diff % 60;

  const pad = (n, w=2) => String(n).padStart(w, '0');

  function setVal(id, val) {
    const el = document.getElementById(id);
    if (el.textContent !== val) {
      el.classList.remove('flip');
      void el.offsetWidth;
      el.classList.add('flip');
      el.textContent = val;
    }
  }

  setVal('days',    pad(days, 3));
  setVal('hours',   pad(hours));
  setVal('minutes', pad(minutes));
  setVal('seconds', pad(secs));
}

// Init
generateHeartFlowers();
generateBgPetals();
updateTimer();
setInterval(updateTimer, 1000);

// Falling petals from tree
const treeWrap = document.getElementById('treeWrap');
function addFallingPetal() {
  const p = document.createElement('span');
  p.className = 'falling-petal';
  p.textContent = ['🌼','💛','✿'][Math.floor(Math.random()*3)];
  const x = 60 + Math.random() * 100;
  p.style.cssText = `
    left:${x}px; top:${60 + Math.random()*80}px;
    --dx:${(Math.random()-0.5)*40}px;
    animation-duration:${2+Math.random()*2}s;
    animation-delay:${Math.random()*3}s;
  `;
  treeWrap.appendChild(p);
  setTimeout(() => p.remove(), 5000);
}
setInterval(addFallingPetal, 800);
</script>
</body>
</html>
